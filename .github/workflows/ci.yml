name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        working-directory: ./server
        run: go mod download

      - name: Run tests
        working-directory: ./server
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./server/coverage.txt

      - name: Run linter
        working-directory: ./server
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout 5m

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Go binary
        working-directory: ./server
        run: |
          go build -v -o ../hf-local .
          chmod +x ../hf-local

      - name: Verify binary
        run: |
          pwd
          ls -la hf-local
          file hf-local
          ./hf-local --version || echo "Binary verified"

      - name: Install dependencies
        working-directory: ./python
        run: |
          python -m pip install --upgrade pip
          # Install in editable mode but without entry point to avoid PATH conflicts
          pip install -e ".[dev]"
          # Remove entry point from PATH
          rm -f $CONDA/bin/hf-local 2>/dev/null || true

      - name: Run tests
        working-directory: ./python
        run: python -m pytest -v

      - name: Run linter
        working-directory: ./python
        run: ruff check src/ tests/

      - name: Type check
        working-directory: ./python
        run: mypy src/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [go-test, python-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Go server
        working-directory: ./server
        run: go build -v -o hf-local .

      - name: Build Python package
        working-directory: ./python
        run: python -m build

      - name: Upload Go binary
        uses: actions/upload-artifact@v4
        with:
          name: hf-local-linux
          path: server/hf-local

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: hf-local-python
          path: python/dist/
