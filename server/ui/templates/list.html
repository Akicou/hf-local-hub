<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HF Local Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a24;
      --bg-hover: #252532;
      --border-primary: #2a2a3a;
      --border-secondary: #353545;
      --text-primary: #f5f5fa;
      --text-secondary: #a0a0b0;
      --text-muted: #6a6a80;
      --accent-gold: #FFD21E;
      --accent-gold-dim: #c9a000;
      --accent-gold-glow: rgba(255, 210, 30, 0.15);
      --green: #22c55e;
      --purple: #a78bfa;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-display);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border-secondary); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Navigation */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-primary);
      padding: 0 32px;
      height: 64px;
      display: flex; align-items: center;
    }
    .nav-inner {
      max-width: 1400px; width: 100%; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 12px;
      color: var(--text-primary); text-decoration: none;
      font-weight: 700; font-size: 18px; letter-spacing: -0.5px;
    }
    .nav-brand svg {
      width: 32px; height: 32px;
      color: var(--accent-gold);
    }
    .nav-links {
      display: flex; align-items: center; gap: 32px;
    }
    .nav-link {
      color: var(--text-secondary); text-decoration: none;
      font-weight: 500; font-size: 14px;
      transition: color 0.2s;
      cursor: pointer;
    }
    .nav-link:hover, .nav-link.active { color: var(--accent-gold); }

    .nav-actions {
      display: flex; align-items: center; gap: 12px;
    }
    .btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      border-radius: var(--radius-md);
      font-family: var(--font-display); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; border: none;
    }
    .btn-primary {
      background: var(--accent-gold);
      color: var(--bg-primary);
    }
    .btn-primary:hover {
      background: #ffe033;
      box-shadow: 0 4px 20px var(--accent-gold-glow);
    }
    .btn-secondary {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-secondary);
      color: var(--text-secondary);
    }
    .btn-secondary:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    /* Search */
    .search-box {
      position: relative;
      flex: 1; max-width: 400px;
      margin: 0 32px;
    }
    .search-box svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 44px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font-display); font-size: 14px;
      outline: none; transition: all 0.2s;
    }
    .search-box input:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 3px var(--accent-gold-glow);
    }
    .search-box input::placeholder { color: var(--text-muted); }

    /* Main Layout */
    .container {
      max-width: 1400px; margin: 0 auto; padding: 32px;
    }

    /* Page Header */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-title {
      font-size: 28px; font-weight: 700;
      letter-spacing: -0.5px;
    }
    .page-count {
      color: var(--text-muted); font-size: 16px;
      font-weight: 400; margin-left: 12px;
    }

    /* Filters */
    .filters {
      display: flex; gap: 8px; margin-bottom: 24px;
    }
    .filter-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-family: var(--font-display); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--border-secondary); color: var(--text-primary); }
    .filter-btn.active {
      border-color: var(--accent-gold-dim);
      background: rgba(255, 210, 30, 0.08);
      color: var(--accent-gold);
    }
    .filter-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .dot-model { background: var(--accent-gold); }
    .dot-dataset { background: var(--green); }
    .dot-space { background: var(--purple); }

    /* Repo Grid */
    .repo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .repo-card {
      display: flex; flex-direction: column;
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      padding: 20px;
      text-decoration: none; color: inherit;
      transition: all 0.2s;
    }
    .repo-card:hover {
      border-color: var(--border-secondary);
      background: var(--bg-tertiary);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .repo-card-header {
      display: flex; align-items: flex-start; gap: 14px;
      margin-bottom: 16px;
    }
    .repo-icon {
      width: 44px; height: 44px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .repo-info { flex: 1; min-width: 0; }
    .repo-name {
      font-size: 15px; font-weight: 600;
      color: var(--text-primary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: var(--font-mono);
      margin-bottom: 4px;
    }
    .repo-name .ns { color: var(--text-muted); font-weight: 400; }
    .repo-meta-row {
      display: flex; align-items: center; gap: 8px;
    }
    .repo-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-model {
      background: rgba(255, 210, 30, 0.1);
      border: 1px solid var(--accent-gold-dim);
      color: var(--accent-gold);
    }
    .badge-dataset {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: var(--green);
    }
    .badge-space {
      background: rgba(167, 139, 250, 0.1);
      border: 1px solid rgba(167, 139, 250, 0.3);
      color: var(--purple);
    }
    .repo-private {
      padding: 3px 10px;
      background: var(--bg-hover);
      border: 1px solid var(--border-secondary);
      border-radius: 20px;
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .repo-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--border-primary);
      font-size: 13px; color: var(--text-muted);
    }
    .repo-date {
      display: flex; align-items: center; gap: 6px;
    }

    /* Empty State */
    .empty-state {
      text-align: center; padding: 100px 20px;
    }
    .empty-icon {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .empty-state h2 {
      font-size: 22px; font-weight: 700;
      margin-bottom: 8px;
    }
    .empty-state p { color: var(--text-muted); margin-bottom: 24px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      width: 100%; max-width: 480px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      transform: translateY(20px) scale(0.98);
      transition: transform 0.3s;
    }
    .modal-overlay.show .modal { transform: translateY(0) scale(1); }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-primary);
    }
    .modal-head h2 { font-size: 18px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm); border: none;
      background: transparent; color: var(--text-muted);
      cursor: pointer; font-size: 20px;
      transition: all 0.2s;
    }
    .modal-close:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .modal-body { padding: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 8px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font-display); font-size: 14px;
      outline: none; transition: all 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 3px var(--accent-gold-glow);
    }
    .form-group input::placeholder { color: var(--text-muted); }
    .form-check {
      display: flex; align-items: center; gap: 10px;
    }
    .form-check input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: var(--accent-gold);
      cursor: pointer;
    }
    .form-check label {
      font-size: 14px; color: var(--text-secondary);
      cursor: pointer;
    }
    .modal-actions {
      display: flex; gap: 12px;
      padding: 0 24px 24px;
    }
    .modal-actions .btn { flex: 1; justify-content: center; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      padding: 14px 20px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-md);
      font-size: 14px; color: var(--text-primary);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(100px); opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: #ef4444; color: #ef4444; }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-hover) 50%, var(--bg-tertiary) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/ui/" class="nav-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        HF Local Hub
      </a>
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search repositories…">
      </div>
      <div class="nav-links">
        <span class="nav-link active" data-tab="models">Models</span>
        <span class="nav-link" data-tab="datasets">Datasets</span>
      </div>
      <div class="nav-actions">
        <button class="btn btn-primary" id="createRepoBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          New Repository
        </button>
        <button class="btn btn-secondary" id="loginBtn">Login</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1 class="page-title">
        <span id="pageTitle">Models</span>
        <span class="page-count" id="repoCount">—</span>
      </h1>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="type" data-value="all">
        <span class="filter-dot" style="background: var(--text-muted)"></span> All
      </button>
      <button class="filter-btn" data-filter="type" data-value="model">
        <span class="filter-dot dot-model"></span> Models
      </button>
      <button class="filter-btn" data-filter="type" data-value="dataset">
        <span class="filter-dot dot-dataset"></span> Datasets
      </button>
      <button class="filter-btn" data-filter="type" data-value="space">
        <span class="filter-dot dot-space"></span> Spaces
      </button>
    </div>

    <div class="repo-grid" id="repoList">
      <div class="repo-card"><div class="skeleton" style="height:100px"></div></div>
      <div class="repo-card"><div class="skeleton" style="height:100px"></div></div>
      <div class="repo-card"><div class="skeleton" style="height:100px"></div></div>
      <div class="repo-card"><div class="skeleton" style="height:100px"></div></div>
    </div>
  </div>

  <div class="modal-overlay" id="repoModal">
    <div class="modal">
      <div class="modal-head">
        <h2>Create Repository</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <form id="createRepoForm">
          <div class="form-group">
            <label>Repository Name</label>
            <input type="text" name="name" required placeholder="my-awesome-model">
          </div>
          <div class="form-group">
            <label>Namespace</label>
            <input type="text" name="namespace" required placeholder="username-or-org">
          </div>
          <div class="form-group">
            <label>Type</label>
            <select name="type">
              <option value="model">Model</option>
              <option value="dataset">Dataset</option>
              <option value="space">Space</option>
            </select>
          </div>
          <div class="form-check">
            <input type="checkbox" name="private" id="private">
            <label for="private">Private repository</label>
          </div>
        </form>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modalCancel">Cancel</button>
        <button class="btn btn-primary" id="modalSubmit">Create</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/ui/app.js"></script>
</body>
</html>
