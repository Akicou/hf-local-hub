<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HF Local Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #12151d;
      --surface2:  #181c27;
      --border:    #1e2436;
      --border2:   #252c3e;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --muted2:    #475569;
      --accent:    #FFD21E;
      --accent-dim:#c9a500;
      --green:     #34d399;
      --blue:      #60a5fa;
      --purple:    #a78bfa;
      --red:       #f87171;
      --radius:    10px;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'Sora', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,15,20,0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      height: 56px;
      display: flex; align-items: center;
    }
    .nav-inner {
      width: 100%; max-width: 1400px; margin: 0 auto;
      padding: 0 24px;
      display: flex; align-items: center; gap: 24px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 15px; letter-spacing: -0.3px;
      color: var(--text); text-decoration: none; white-space: nowrap;
    }
    .nav-logo svg { color: var(--accent); flex-shrink: 0; }
    .nav-search {
      flex: 1; max-width: 380px;
      position: relative;
    }
    .nav-search svg {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .nav-search input {
      width: 100%;
      padding: 7px 12px 7px 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 13px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .nav-search input::placeholder { color: var(--muted); }
    .nav-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,210,30,.08);
    }
    .nav-tabs { display: flex; align-items: center; gap: 2px; }
    .nav-tab {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 13px; font-weight: 500;
      color: var(--muted);
      border: none; background: none;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-tab:hover { color: var(--text); background: var(--surface2); }
    .nav-tab.active { color: var(--text); background: var(--surface2); }
    .nav-tab svg { opacity: .7; }
    .nav-tab.active svg { opacity: 1; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .btn-new {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: var(--accent);
      color: #0d0f14;
      border: none; border-radius: 8px;
      font-family: var(--font-sans); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .btn-new:hover { background: #ffe44d; }
    .btn-new:active { transform: scale(.97); }
    .btn-login {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--font-sans); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .15s;
    }
    .btn-login:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
    .btn-login.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

    /* ── LAYOUT ── */
    .layout {
      max-width: 1400px; margin: 0 auto;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
      padding: 0;
      min-height: calc(100vh - 56px);
    }

    /* ── SIDEBAR ── */
    aside {
      border-right: 1px solid var(--border);
      padding: 24px 20px;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
    }
    .sidebar-section { margin-bottom: 24px; }
    .sidebar-section h4 {
      font-size: 11px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }
    .filter-pill-grid {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .filter-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px; font-weight: 500;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer; transition: all .12s;
    }
    .filter-pill:hover { border-color: var(--accent); color: var(--text); }
    .filter-pill.active { border-color: var(--accent); background: rgba(255,210,30,.08); color: var(--accent); }
    .filter-pill .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .type-model .dot { background: var(--accent); }
    .type-dataset .dot { background: var(--green); }
    .type-space .dot { background: var(--purple); }

    /* ── MAIN ── */
    main { padding: 24px 28px; }

    .main-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .main-title {
      display: flex; align-items: baseline; gap: 10px;
      font-size: 20px; font-weight: 600; letter-spacing: -.4px;
    }
    .main-count {
      font-size: 13px; font-weight: 400; color: var(--muted);
      font-family: var(--font-mono);
    }

    /* ── REPO GRID ── */
    .repo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      aside { display: none; }
      .repo-grid { grid-template-columns: 1fr; }
    }

    .repo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .repo-card:hover {
      border-color: var(--border2);
      background: var(--surface2);
      transform: translateY(-1px);
    }
    .repo-card-top {
      display: flex; align-items: flex-start; gap: 10px;
    }
    .repo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .icon-model  { background: rgba(255,210,30,.1); }
    .icon-dataset { background: rgba(52,211,153,.1); }
    .icon-space  { background: rgba(167,139,250,.1); }
    .repo-card-meta { flex: 1; min-width: 0; }
    .repo-name {
      font-size: 13px; font-weight: 600;
      color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: var(--font-mono);
    }
    .repo-name .ns { color: var(--muted); font-weight: 400; }
    .repo-ns { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .repo-card-footer {
      display: flex; align-items: center; gap: 8px;
    }
    .type-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 20px; font-size: 11px; font-weight: 500;
      border: 1px solid transparent;
    }
    .badge-model   { border-color: rgba(255,210,30,.3); color: var(--accent); background: rgba(255,210,30,.07); }
    .badge-dataset { border-color: rgba(52,211,153,.3); color: var(--green); background: rgba(52,211,153,.07); }
    .badge-space   { border-color: rgba(167,139,250,.3); color: var(--purple); background: rgba(167,139,250,.07); }
    .repo-date {
      margin-left: auto;
      font-size: 11px; color: var(--muted2);
      font-family: var(--font-mono);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1/-1;
      display: flex; flex-direction: column; align-items: center;
      padding: 80px 0; gap: 12px; color: var(--muted);
    }
    .empty-state svg { opacity: .3; }
    .empty-state p { font-size: 14px; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width: 100%; max-width: 440px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      transform: translateY(12px) scale(.97);
      transition: transform .2s;
    }
    .modal-overlay.show .modal { transform: none; }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-head h2 { font-size: 15px; font-weight: 600; }
    .modal-close {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 7px; border: none;
      background: transparent; color: var(--muted);
      cursor: pointer; font-size: 18px; line-height: 1;
      transition: background .12s, color .12s;
    }
    .modal-close:hover { background: var(--border); color: var(--text); }
    .modal form { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; font-weight: 500; color: var(--muted); }
    .form-group input,
    .form-group select {
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-sans); font-size: 13px;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,210,30,.08);
    }
    .form-group input::placeholder { color: var(--muted2); }
    .form-group select option { background: var(--surface2); }
    .form-check {
      display: flex; align-items: center; gap: 8px;
    }
    .form-check input[type="checkbox"] {
      width: 15px; height: 15px; padding: 0; border-radius: 4px;
      accent-color: var(--accent); cursor: pointer;
    }
    .form-check label { font-size: 13px; color: var(--muted); cursor: pointer; }
    .modal-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      padding: 0 20px 20px;
    }
    .btn-cancel {
      padding: 9px; border-radius: 8px;
      border: 1px solid var(--border2);
      background: transparent; color: var(--muted);
      font-family: var(--font-sans); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .12s;
    }
    .btn-cancel:hover { color: var(--text); background: var(--surface); }
    .btn-submit {
      padding: 9px; border-radius: 8px;
      border: none;
      background: var(--accent); color: #0d0f14;
      font-family: var(--font-sans); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .12s;
    }
    .btn-submit:hover { background: #ffe44d; }

    /* ── LOADING SKELETON ── */
    .skeleton {
      animation: pulse 1.4s ease-in-out infinite;
      background: var(--surface2);
      border-radius: 6px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      padding: 12px 18px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      font-size: 13px; color: var(--text);
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      transform: translateY(12px); opacity: 0;
      transition: all .2s;
      pointer-events: none;
    }
    .toast.show { transform: none; opacity: 1; }
    .toast.error { border-color: rgba(248,113,113,.4); color: var(--red); }
    .toast.success { border-color: rgba(52,211,153,.4); color: var(--green); }

    /* ── REPO DETAIL ── */
    .repo-detail {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      min-height: calc(100vh - 80px);
    }
    .detail-header {
      margin-bottom: 20px;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer; margin-bottom: 16px;
    }
    .btn-back:hover { color: var(--text); background: var(--surface2); }
    .detail-title {
      font-size: 22px; font-weight: 600;
      margin-bottom: 8px;
    }
    .detail-ns { color: var(--muted); font-weight: 400; }
    .detail-private {
      display: inline-flex;
      padding: 2px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px; color: var(--muted);
      margin-left: 8px; vertical-align: middle;
    }
    .detail-meta {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 13px;
    }
    .detail-tabs {
      display: flex; gap: 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .detail-tab {
      padding: 10px 16px;
      background: none;
      border: none; border-bottom: 2px solid transparent;
      color: var(--muted); font-size: 14px;
      cursor: pointer; margin-bottom: -1px;
    }
    .detail-tab:hover { color: var(--text); }
    .detail-tab.active { color: var(--accent); border-color: var(--accent); }
    .detail-content { min-height: 300px; }

    /* File browser */
    .file-browser {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .file-header {
      display: grid; grid-template-columns: 2fr 100px 120px;
      padding: 10px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 12px; color: var(--muted);
      font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .file-row {
      display: grid; grid-template-columns: 2fr 100px 120px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px; color: var(--text);
      align-items: center;
    }
    .file-row:last-child { border-bottom: none; }
    .file-row:hover { background: var(--surface2); }
    .file-row svg { margin-right: 8px; color: var(--muted); }
    .file-row.folder svg { color: var(--accent-dim); }
    .file-path-col { display: flex; align-items: center; }
    .file-size-col, .file-date-col { color: var(--muted); font-size: 12px; }

    /* Empty repo */
    .empty-repo {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-repo h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .empty-repo p { color: var(--muted); margin-bottom: 32px; }
    .upload-help {
      max-width: 600px; margin: 0 auto 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px; text-align: left;
    }
    .upload-help h4 {
      font-size: 13px; font-weight: 600;
      margin-bottom: 12px; color: var(--text);
    }
    .upload-help pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-family: var(--font-mono); font-size: 12px;
      overflow-x: auto; color: var(--muted);
      margin: 0 0 12px; line-height: 1.5;
    }
    .btn-copy {
      padding: 6px 12px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text); font-size: 12px;
      cursor: pointer; float: right;
    }
    .btn-copy:hover { background: var(--border); }
    .empty-tab {
      text-align: center; padding: 80px 20px;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="#">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        HF Local Hub
      </a>

      <div class="nav-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search repositories…">
      </div>

      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="models">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          Models
        </button>
        <button class="nav-tab" data-tab="datasets">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4.03 3-9 3S3 13.66 3 12M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/></svg>
          Datasets
        </button>
      </div>

      <div class="nav-right">
        <button class="btn-new" id="createRepoBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          New
        </button>
        <button class="btn-login" id="loginBtn">Login</button>
      </div>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="layout">
    <!-- SIDEBAR -->
    <aside>
      <div class="sidebar-section">
        <h4>Type</h4>
        <div class="filter-pill-grid">
          <button class="filter-pill type-model active" data-filter="type" data-value="all">
            <span class="dot"></span> All
          </button>
          <button class="filter-pill type-model" data-filter="type" data-value="model">
            <span class="dot"></span> Model
          </button>
          <button class="filter-pill type-dataset" data-filter="type" data-value="dataset">
            <span class="dot"></span> Dataset
          </button>
          <button class="filter-pill type-space" data-filter="type" data-value="space">
            <span class="dot"></span> Space
          </button>
        </div>
      </div>

      <div class="sidebar-section">
        <h4>Visibility</h4>
        <div class="filter-pill-grid">
          <button class="filter-pill active" data-filter="privacy" data-value="all">All</button>
          <button class="filter-pill" data-filter="privacy" data-value="public">Public</button>
          <button class="filter-pill" data-filter="privacy" data-value="private">Private</button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main>
      <div class="main-header">
        <div class="main-title">
          <span id="pageTitle">Models</span>
          <span class="main-count" id="repoCount">—</span>
        </div>
      </div>

      <div class="repo-grid" id="repoList">
        <!-- skeletons -->
        <div class="repo-card"><div class="skeleton" style="height:60px"></div></div>
        <div class="repo-card"><div class="skeleton" style="height:60px"></div></div>
        <div class="repo-card"><div class="skeleton" style="height:60px"></div></div>
        <div class="repo-card"><div class="skeleton" style="height:60px"></div></div>
      </div>
    </main>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="repoModal">
    <div class="modal">
      <div class="modal-head">
        <h2>Create Repository</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="createRepoForm">
        <div class="form-group">
          <label>Repository Name</label>
          <input type="text" name="name" required placeholder="my-awesome-model">
        </div>
        <div class="form-group">
          <label>Namespace</label>
          <input type="text" name="namespace" required placeholder="username-or-org">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select name="type">
            <option value="model">Model</option>
